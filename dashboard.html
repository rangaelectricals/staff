<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — RANGA ELECTRICALS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };</script>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>

<body class="min-h-screen  font-sans">
  <div class="drawer lg:drawer-open">
    <input id="drawer-toggle" type="checkbox" class="drawer-toggle" />

    <!-- ── Main Content ─────────────────────────────── -->
    <div class="drawer-content flex flex-col min-h-screen">

      <!-- Topbar -->
      <header class="topbar">
        <label for="drawer-toggle" class="btn btn-sm btn-ghost lg:hidden">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </label>
        <span class="text-slate-600 font-semibold text-sm hidden lg:block">RANGA ELECTRICALS</span>
        <div class="flex-1"></div>
        <a href="add-staff.html" class="btn btn-brand btn-sm gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
          Add Staff
        </a>
      </header>

      <!-- Page Content -->
      <main class="flex-1 p-4 md:p-6 lg:p-8 space-y-6">

        <!-- Hero -->
        <div class="page-hero flex items-center gap-4">
          <div class="hero-blob-1"></div>
          <div class="hero-blob-2"></div>
          <div class="hero-blob-3"></div>
          <div class="hero-icon relative z-10">
            <svg class="w-7 h-7 " viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
            </svg>
          </div>
          <div class="relative z-10">
            <h1 class="text-2xl md:text-3xl font-extrabold  tracking-tight">Dashboard</h1>
            <p class="text-slate-600 font-semibold text-sm mt-1">Workforce metrics at a glance</p>
          </div>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <div class="stat-card stat-total shadow-sm" style="animation-delay:0s">
            <div class="stat-icon"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
              </svg></div>
            <div>
              <div class="stat-label">Total Staff</div>
              <div class="stat-value" id="stat-total">—</div>
            </div>
          </div>
          <div class="stat-card stat-drivers shadow-sm" style="animation-delay:.1s">
            <div class="stat-icon"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5H6.5c-.66 0-1.22.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z" />
              </svg></div>
            <div>
              <div class="stat-label">Drivers</div>
              <div class="stat-value" id="stat-drivers">—</div>
            </div>
          </div>
          <div class="stat-card stat-elec shadow-sm" style="animation-delay:.2s">
            <div class="stat-icon"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M13 2h-2v3h2V2zm0 16h-2v3h2v-3zM7 5.5L4.929 3.429 3.515 4.843 5.585 6.914 7 5.5zm8 8L12.93 11.43l-1.414 1.414 2.071 2.071 1.414-1.415z" />
              </svg></div>
            <div>
              <div class="stat-label">Electricians</div>
              <div class="stat-value" id="stat-electricians">—</div>
            </div>
          </div>
          <div class="stat-card stat-new shadow-sm" style="animation-delay:.3s">
            <div class="stat-icon"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" />
              </svg></div>
            <div>
              <div class="stat-label">New (30d)</div>
              <div class="stat-value" id="stat-new">—</div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="sys-card animate-fadeIn delay-400">
          <div class="sys-card-header">
            <div class="card-icon bg-orange-50">
              <svg class="w-5 h-5 text-orange-500" viewBox="0 0 24 24" fill="currentColor">
                <path d="M13 10v-3l7 5-7 5v-3H3v-4h10z" />
              </svg>
            </div>
            <h3>Quick Actions</h3>
          </div>
          <div class="sys-card-body flex flex-wrap gap-3">
            <a href="staff-list.html" class="btn btn-outline btn-info gap-2">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
              </svg>
              View Staff List
            </a>
            <a href="add-staff.html" class="btn btn-brand gap-2">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
              </svg>
              Add New Staff
            </a>
          </div>
        </div>

      </main>
    </div>

    <!-- ── Sidebar ────────────────────────────────────── -->
    <div class="drawer-side z-50">
      <label for="drawer-toggle" class="drawer-overlay"></label>
      <aside class="sidebar">
        <div class="sidebar-logo flex items-center gap-3">
          <div class="logo-mark bg-yellow-100 flex justify-center items-center rounded-lg"
            style="width:32px;height:32px;">
            <svg class="w-5 h-5 text-yellow-600" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <div>
            <div class="logo-text">RANGA ELECTRICALS</div>
            <div class="logo-sub">Workspace</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-section-label">Main Menu</div>
          <a href="dashboard.html" class="sidebar-item active">
            <div class="nav-icon"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
              </svg></div>
            Dashboard
          </a>
          <a href="staff-list.html" class="sidebar-item">
            <div class="nav-icon"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
              </svg></div>
            Staff List
          </a>
          <a href="add-staff.html" class="sidebar-item">
            <div class="nav-icon"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
              </svg></div>
            Add Staff
          </a>
        </nav>
      </aside>
    </div>
  </div>

  <div id="toast" class="toast toast-end z-50"></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/dashboard-page.js"></script>
</body>

</html>
